AWSTemplateFormatVersion: "2010-09-09"
Description: "LiteLLM Gateway - Secrets Manager (tenant/provider namespace)"

Parameters:
  ProjectName:
    Type: String
    Default: litellm-gw
  TenantName:
    Type: String
    Default: default
    Description: "Tenant namespace for secrets"

Resources:
  # --- DB Password (auto-generated) ---
  DbPasswordSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "litellm/${TenantName}/db-password"
      Description: "RDS master password for LiteLLM"
      GenerateSecretString:
        SecretStringTemplate: '{"username": "litellm"}'
        GenerateStringKey: "password"
        PasswordLength: 32
        ExcludePunctuation: true

  # --- LiteLLM Master Key (auto-generated) ---
  MasterKeySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "litellm/${TenantName}/master-key"
      Description: "LiteLLM proxy master/admin key"
      GenerateSecretString:
        SecretStringTemplate: '{"master_key": ""}'
        GenerateStringKey: "master_key"
        PasswordLength: 40
        ExcludeCharacters: '"@/\'
        ExcludePunctuation: false

  # --- Provider API Keys (placeholder, update after deployment) ---
  OpenAISecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "litellm/${TenantName}/openai"
      Description: "OpenAI API Key"
      SecretString: '{"api_key": "REPLACE_WITH_OPENAI_API_KEY"}'

  AnthropicSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "litellm/${TenantName}/anthropic"
      Description: "Anthropic API Key"
      SecretString: '{"api_key": "REPLACE_WITH_ANTHROPIC_API_KEY"}'

  GeminiSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "litellm/${TenantName}/gemini"
      Description: "Google Gemini API Key"
      SecretString: '{"api_key": "REPLACE_WITH_GEMINI_API_KEY"}'

Outputs:
  DbPasswordSecretArn:
    Value: !Ref DbPasswordSecret
    Export:
      Name: !Sub "${ProjectName}-DbPasswordSecretArn"
  MasterKeySecretArn:
    Value: !Ref MasterKeySecret
    Export:
      Name: !Sub "${ProjectName}-MasterKeySecretArn"
  OpenAISecretArn:
    Value: !Ref OpenAISecret
    Export:
      Name: !Sub "${ProjectName}-OpenAISecretArn"
  AnthropicSecretArn:
    Value: !Ref AnthropicSecret
    Export:
      Name: !Sub "${ProjectName}-AnthropicSecretArn"
  GeminiSecretArn:
    Value: !Ref GeminiSecret
    Export:
      Name: !Sub "${ProjectName}-GeminiSecretArn"
