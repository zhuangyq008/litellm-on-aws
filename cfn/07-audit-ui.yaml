AWSTemplateFormatVersion: "2010-09-09"
Description: "Audit UI - Cognito, API Gateway, Query Lambda, SPA (S3 + CloudFront)"

Parameters:
  ProjectName:
    Type: String
    Default: litellm-gw
  CallbackUrl:
    Type: String
    Default: "https://localhost:3000"
    Description: "SPA callback URL (update after CloudFront is created)"

Resources:
  # --- Cognito User Pool ---
  AuditUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "${ProjectName}-audit-userpool"
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
      Schema:
        - Name: email
          Required: true
          Mutable: true

  AuditUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Sub "${ProjectName}-audit-${AWS::AccountId}"
      UserPoolId: !Ref AuditUserPool

  AuditUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub "${ProjectName}-audit-spa"
      UserPoolId: !Ref AuditUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_REFRESH_TOKEN_AUTH
      SupportedIdentityProviders:
        - COGNITO
      AllowedOAuthFlows:
        - code
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthScopes:
        - openid
        - email
        - profile
      CallbackURLs:
        - !Ref CallbackUrl
      LogoutURLs:
        - !Ref CallbackUrl
      AccessTokenValidity: 1
      RefreshTokenValidity: 30
      TokenValidityUnits:
        AccessToken: hours
        RefreshToken: days

  # --- Query Lambda Role ---
  QueryLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-query-api-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: AthenaQuery
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - athena:StartQueryExecution
                  - athena:GetQueryExecution
                  - athena:GetQueryResults
                  - athena:StopQueryExecution
                Resource: "*"
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:GetBucketLocation
                  - s3:ListBucket
                Resource:
                  - Fn::ImportValue: !Sub "${ProjectName}-AuditBucketArn"
                  - !Sub
                    - "${BucketArn}/*"
                    - BucketArn:
                        Fn::ImportValue: !Sub "${ProjectName}-AuditBucketArn"
              - Effect: Allow
                Action:
                  - glue:GetTable
                  - glue:GetDatabase
                  - glue:GetPartitions
                Resource: "*"

  # --- Query Lambda ---
  QueryLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-query-api"
      Runtime: python3.12
      Handler: handler.handler
      MemorySize: 256
      Timeout: 30
      Role: !GetAtt QueryLambdaRole.Arn
      Code:
        S3Bucket:
          Fn::ImportValue: !Sub "${ProjectName}-ConfigBucketName"
        S3Key: lambda/query-api.zip
      Environment:
        Variables:
          ATHENA_DATABASE:
            Fn::ImportValue: !Sub "${ProjectName}-AuditGlueDatabaseName"
          ATHENA_TABLE: audit_logs
          ATHENA_WORKGROUP:
            Fn::ImportValue: !Sub "${ProjectName}-AuditAthenaWorkgroupName"
          S3_OUTPUT_LOCATION: !Sub
            - "s3://${BucketName}/athena-results/"
            - BucketName:
                Fn::ImportValue: !Sub "${ProjectName}-AuditBucketName"

  QueryLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref QueryLambdaFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${AuditApi}/*"

  # --- API Gateway ---
  AuditApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub "${ProjectName}-audit-api"
      Description: "Audit Log Query API"

  AuditApiAuthorizer:
    Type: AWS::ApiGateway::Authorizer
    Properties:
      Name: CognitoAuthorizer
      RestApiId: !Ref AuditApi
      Type: COGNITO_USER_POOLS
      IdentitySource: method.request.header.Authorization
      ProviderARNs:
        - !GetAtt AuditUserPool.Arn

  ApiResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref AuditApi
      ParentId: !GetAtt AuditApi.RootResourceId
      PathPart: api

  ApiProxyResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref AuditApi
      ParentId: !Ref ApiResource
      PathPart: "{proxy+}"

  ApiQueryResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref AuditApi
      ParentId: !Ref ApiResource
      PathPart: query

  ApiQueryMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref AuditApi
      ResourceId: !Ref ApiQueryResource
      HttpMethod: POST
      AuthorizationType: COGNITO_USER_POOLS
      AuthorizerId: !Ref AuditApiAuthorizer
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${QueryLambdaFunction.Arn}/invocations"

  ApiProxyMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref AuditApi
      ResourceId: !Ref ApiProxyResource
      HttpMethod: GET
      AuthorizationType: COGNITO_USER_POOLS
      AuthorizerId: !Ref AuditApiAuthorizer
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${QueryLambdaFunction.Arn}/invocations"

  ApiOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref AuditApi
      ResourceId: !Ref ApiProxyResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{"statusCode": 200}'
        IntegrationResponses:
          - StatusCode: "200"
            ResponseParameters:
              method.response.header.Access-Control-Allow-Origin: "'*'"
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,Authorization'"
              method.response.header.Access-Control-Allow-Methods: "'GET,POST,OPTIONS'"
      MethodResponses:
        - StatusCode: "200"
          ResponseParameters:
            method.response.header.Access-Control-Allow-Origin: true
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - ApiQueryResource
      - ApiQueryMethod
      - ApiProxyMethod
      - ApiOptionsMethod
    Properties:
      RestApiId: !Ref AuditApi

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref AuditApi
      DeploymentId: !Ref ApiDeployment
      StageName: prod

  # --- SPA S3 Bucket ---
  SpaBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-audit-ui-${AWS::AccountId}"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  SpaBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SpaBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${SpaBucket.Arn}/*"
            Condition:
              StringEquals:
                "AWS:SourceArn": !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${SpaCloudFront}"

  # --- CloudFront for SPA ---
  SpaOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${ProjectName}-audit-spa-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  SpaCloudFront:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt SpaBucket.RegionalDomainName
            OriginAccessControlId: !Ref SpaOAC
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
          CachedMethods:
            - GET
            - HEAD
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          Compress: true
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html

Outputs:
  CognitoUserPoolId:
    Value: !Ref AuditUserPool
    Export:
      Name: !Sub "${ProjectName}-AuditUserPoolId"
  CognitoClientId:
    Value: !Ref AuditUserPoolClient
    Export:
      Name: !Sub "${ProjectName}-AuditClientId"
  CognitoDomain:
    Value: !Sub "${ProjectName}-audit-${AWS::AccountId}.auth.${AWS::Region}.amazoncognito.com"
    Export:
      Name: !Sub "${ProjectName}-AuditCognitoDomain"
  ApiEndpoint:
    Value: !Sub "https://${AuditApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
    Export:
      Name: !Sub "${ProjectName}-AuditApiEndpoint"
  SpaBucketName:
    Value: !Ref SpaBucket
    Export:
      Name: !Sub "${ProjectName}-AuditSpaBucketName"
  SpaCloudFrontDomain:
    Value: !GetAtt SpaCloudFront.DomainName
    Export:
      Name: !Sub "${ProjectName}-AuditSpaDomain"
  SpaCloudFrontDistributionId:
    Value: !Ref SpaCloudFront
    Export:
      Name: !Sub "${ProjectName}-AuditSpaDistributionId"
